apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent-readonly
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "persistentvolumes"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-agent-cluster
subjects:
- kind: Group
  name: devops-agent
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: devops-agent-readonly
  apiGroup: rbac.authorization.k8s.io
---
# Full read access to app namespace only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: app
  name: devops-agent-app
rules:
- apiGroups: ["", "apps", "batch", "networking.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-agent-app
  namespace: app
subjects:
- kind: Group
  name: devops-agent
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: devops-agent-app
  apiGroup: rbac.authorization.k8s.io
---
# kube-system read for node-level diagnostics
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: kube-system
  name: devops-agent-kubesystem
rules:
- apiGroups: ["", "apps"]
  resources: ["pods", "deployments", "daemonsets", "configmaps", "services"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-agent-kubesystem
  namespace: kube-system
subjects:
- kind: Group
  name: devops-agent
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: devops-agent-kubesystem
  apiGroup: rbac.authorization.k8s.io
