<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1050" width="1300" height="1050" font-family="Arial, sans-serif">
  <defs>
    <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF9900"/></marker>
    <marker id="a-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2196F3"/></marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/></marker>
    <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9C27B0"/></marker>
    <marker id="a-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00BCD4"/></marker>
    <marker id="a-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#666"/></marker>
  </defs>

  <rect width="1300" height="1050" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="650" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF9900">Incident Graph — Data Sources, Neptune, and Visualization</text>
  <text x="650" y="52" text-anchor="middle" font-size="11" fill="#888">How investigation data flows into Neptune and the D3.js graph served via CloudFront</text>

  <!-- ==================== LEFT COLUMN: DATA SOURCES ==================== -->
  <text x="200" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#4CAF50">Data Sources → Neptune</text>

  <!-- Source 1: Agent AGENTS.md instruction -->
  <rect x="40" y="110" width="320" height="90" rx="8" fill="#1B2838" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="55" y="122" width="28" height="28" rx="5" fill="#4CAF50"/>
  <text x="69" y="141" text-anchor="middle" font-size="12" fill="#fff">🤖</text>
  <text x="95" y="135" font-size="11" fill="#A5D6A7" font-weight="bold">DevOps Agent (AGENTS.md)</text>
  <text x="95" y="152" font-size="9" fill="#B0BEC5">Instructed to output resource ARNs</text>
  <text x="55" y="172" font-size="8" fill="#E0E0E0">AGENTS.md → "In FINAL summary, include</text>
  <text x="55" y="184" font-size="8" fill="#E0E0E0">## Affected Resource Identifiers with full ARNs</text>
  <text x="55" y="196" font-size="8" fill="#64B5F6">and namespace/kind/name for K8s resources"</text>

  <!-- Source 2: RCA Writer extracts ARNs -->
  <rect x="40" y="230" width="320" height="100" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="55" y="242" width="28" height="28" rx="5" fill="#FF9900"/>
  <text x="69" y="261" text-anchor="middle" font-size="12" fill="#fff">λ</text>
  <text x="95" y="255" font-size="11" fill="#FFD54F" font-weight="bold">rca_writer Lambda</text>
  <text x="95" y="272" font-size="9" fill="#B0BEC5">On Investigation Completed</text>
  <text x="55" y="292" font-size="8" fill="#E0E0E0">1. Fetches RCA markdown from agent API</text>
  <text x="55" y="304" font-size="8" fill="#E0E0E0">2. Regex extracts: arn:aws:* and namespace/kind/name</text>
  <text x="55" y="316" font-size="8" fill="#E0E0E0">3. Writes resource_arns to DynamoDB</text>
  <text x="55" y="328" font-size="8" fill="#E0E0E0">4. Writes graph/{incident_id}.json to S3</text>

  <!-- Source 3: Dispatcher (status + links) -->
  <rect x="40" y="360" width="320" height="80" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="55" y="372" width="28" height="28" rx="5" fill="#FF9900"/>
  <text x="69" y="391" text-anchor="middle" font-size="12" fill="#fff">λ</text>
  <text x="95" y="385" font-size="11" fill="#FFD54F" font-weight="bold">dispatcher Lambda</text>
  <text x="95" y="402" font-size="9" fill="#B0BEC5">On every lifecycle event</text>
  <text x="55" y="422" font-size="8" fill="#E0E0E0">Writes: status (Created/InProgress/Completed/Linked)</text>
  <text x="55" y="434" font-size="8" fill="#E0E0E0">task_id, space_id, region → DynamoDB</text>

  <!-- Source 4: AWS Config (GRAYED OUT) -->
  <rect x="40" y="480" width="320" height="90" rx="8" fill="#1B2838" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <rect x="55" y="492" width="28" height="28" rx="5" fill="#555"/>
  <text x="69" y="511" text-anchor="middle" font-size="12" fill="#999">⚙</text>
  <text x="95" y="505" font-size="11" fill="#777" font-weight="bold">AWS Config (future)</text>
  <text x="95" y="522" font-size="9" fill="#555">config_sync Lambda — every 5 min</text>
  <text x="55" y="542" font-size="8" fill="#555">Syncs InfraResource nodes: VPCs, EKS clusters,</text>
  <text x="55" y="554" font-size="8" fill="#555">Subnets, SGs, Lambda functions, DynamoDB tables</text>
  <text x="55" y="566" font-size="8" fill="#555" font-style="italic">Future: query resource existence, get tags for drill-down</text>

  <!-- ==================== CENTER: DynamoDB + Neptune ==================== -->

  <!-- DynamoDB -->
  <rect x="470" y="270" width="200" height="70" rx="8" fill="#1B2838" stroke="#2196F3" stroke-width="2"/>
  <rect x="485" y="282" width="28" height="28" rx="5" fill="#2196F3"/>
  <text x="499" y="301" text-anchor="middle" font-size="12" fill="#fff">⬡</text>
  <text x="525" y="295" font-size="11" fill="#90CAF9" font-weight="bold">DynamoDB</text>
  <text x="525" y="312" font-size="8" fill="#B0BEC5">fis-chaos-investigations</text>
  <text x="525" y="326" font-size="7" fill="#64B5F6">affected_resources, cascade_graph, resource_arns</text>

  <!-- DynamoDB Streams -->
  <rect x="470" y="380" width="200" height="40" rx="6" fill="#1B2838" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="570" y="405" text-anchor="middle" font-size="10" fill="#CE93D8" font-weight="bold">DynamoDB Streams</text>

  <line x1="570" y1="340" x2="570" y2="378" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- Neptune Feeder -->
  <rect x="470" y="455" width="200" height="70" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="485" y="467" width="28" height="28" rx="5" fill="#FF9900"/>
  <text x="499" y="486" text-anchor="middle" font-size="12" fill="#fff">λ</text>
  <text x="525" y="480" font-size="11" fill="#FFD54F" font-weight="bold">neptune_feeder</text>
  <text x="525" y="497" font-size="9" fill="#B0BEC5">Creates graph nodes + edges</text>
  <text x="485" y="515" font-size="7" fill="#E0E0E0">Investigation, Resource, Cause, ArnResource, K8sResource</text>

  <line x1="570" y1="420" x2="570" y2="453" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- Neptune -->
  <rect x="450" y="560" width="240" height="80" rx="10" fill="#1B2838" stroke="#9C27B0" stroke-width="2"/>
  <rect x="465" y="575" width="32" height="32" rx="6" fill="#9C27B0"/>
  <text x="481" y="596" text-anchor="middle" font-size="14" fill="#fff">◉</text>
  <text x="510" y="590" font-size="13" fill="#CE93D8" font-weight="bold">Neptune</text>
  <text x="510" y="607" font-size="9" fill="#B0BEC5">Graph DB (Gremlin)</text>
  <text x="465" y="630" font-size="8" fill="#E0E0E0">Nodes: Investigation, Resource, Cause, ArnResource</text>
  <text x="465" y="642" font-size="8" fill="#555" font-style="italic">Future: InfraResource (from Config), same_as edges</text>

  <line x1="570" y1="525" x2="570" y2="558" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#a-purple)"/>

  <!-- Arrows from sources to DynamoDB -->
  <line x1="360" y1="280" x2="468" y2="295" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#a-green)"/>
  <line x1="360" y1="390" x2="468" y2="310" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#a-green)"/>

  <!-- Arrow from Config to Neptune (grayed, dashed) -->
  <line x1="360" y1="530" x2="448" y2="590" stroke="#555" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#a-gray)"/>
  <text x="400" y="555" font-size="7" fill="#555">future: direct to Neptune</text>

  <!-- Arrow from Agent instruction to RCA Writer -->
  <line x1="200" y1="200" x2="200" y2="228" stroke="#4CAF50" stroke-width="1" marker-end="url(#a-green)"/>
  <text x="215" y="218" font-size="7" fill="#4CAF50">produces ARNs</text>

  <!-- ==================== RIGHT COLUMN: GRAPH GENERATION + SERVING ==================== -->
  <text x="1000" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#00BCD4">Graph Generation + Serving</text>

  <!-- S3 graph/ prefix -->
  <rect x="830" y="120" width="240" height="80" rx="8" fill="#1B2838" stroke="#3F8624" stroke-width="1.5"/>
  <rect x="845" y="132" width="28" height="28" rx="5" fill="#3F8624"/>
  <text x="859" y="151" text-anchor="middle" font-size="12" fill="#fff">🪣</text>
  <text x="885" y="145" font-size="11" fill="#81C784" font-weight="bold">S3 Bucket</text>
  <text x="885" y="162" font-size="9" fill="#B0BEC5">fis-chaos-results-{account}</text>
  <text x="845" y="182" font-size="8" fill="#E0E0E0">graph/{incident_id}.json — per investigation</text>
  <text x="845" y="194" font-size="8" fill="#E0E0E0">graph/index.html — generated D3.js page</text>

  <!-- Arrow from rca_writer to S3 -->
  <line x1="360" y1="310" x2="828" y2="160" stroke="#3F8624" stroke-width="1.5" marker-end="url(#a-green)"/>
  <text x="580" y="225" font-size="8" fill="#81C784">writes graph/*.json</text>

  <!-- Hybrid Trigger -->
  <rect x="830" y="240" width="240" height="70" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1"/>
  <text x="950" y="262" text-anchor="middle" font-size="10" fill="#FFD54F" font-weight="bold">Hybrid Trigger</text>
  <text x="845" y="280" font-size="8" fill="#E0E0E0">① EventBridge schedule: every 5 min</text>
  <text x="845" y="293" font-size="8" fill="#E0E0E0">② S3 event → SQS (60s batch) → on new graph/*.json</text>
  <text x="845" y="306" font-size="8" fill="#64B5F6" font-style="italic">Near-real-time: ~60s after investigation completes</text>

  <line x1="950" y1="200" x2="950" y2="238" stroke="#FF9900" stroke-width="1" marker-end="url(#a-orange)"/>
  <text x="965" y="222" font-size="7" fill="#FF9900">S3 event</text>

  <!-- Graph Builder Lambda -->
  <rect x="830" y="345" width="240" height="130" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="2"/>
  <rect x="845" y="357" width="30" height="30" rx="5" fill="#FF9900"/>
  <text x="860" y="377" text-anchor="middle" font-size="14" fill="#fff">λ</text>
  <text x="885" y="370" font-size="12" fill="#FFD54F" font-weight="bold">graph_builder</text>
  <text x="885" y="387" font-size="9" fill="#B0BEC5">Assembles HTML every trigger</text>
  <text x="845" y="410" font-size="8" fill="#E0E0E0">1. Read graph/*.json from S3 (30-day TTL)</text>
  <text x="845" y="422" font-size="8" fill="#E0E0E0">2. Scan DynamoDB (live status + task_id/space_id)</text>
  <text x="845" y="434" font-size="8" fill="#E0E0E0">3. Merge: S3 has edges, DDB has deep links</text>
  <text x="845" y="446" font-size="8" fill="#E0E0E0">4. Generate D3.js force-directed HTML</text>
  <text x="845" y="458" font-size="8" fill="#E0E0E0">5. Write graph/index.html to S3</text>

  <line x1="950" y1="310" x2="950" y2="343" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <!-- Arrow: graph_builder reads DynamoDB -->
  <line x1="830" y1="430" x2="672" y2="310" stroke="#2196F3" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-blue)"/>
  <text x="740" y="365" font-size="7" fill="#90CAF9">scan (live status)</text>

  <!-- Arrow: graph_builder reads S3 -->
  <line x1="900" y1="345" x2="900" y2="200" stroke="#3F8624" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="910" y="330" font-size="7" fill="#81C784">read graph/*.json</text>

  <!-- Arrow: graph_builder writes index.html to S3 -->
  <line x1="1000" y1="345" x2="1050" y2="200" stroke="#3F8624" stroke-width="1.5" marker-end="url(#a-green)"/>
  <text x="1040" y="280" font-size="7" fill="#81C784">write index.html</text>

  <!-- CloudFront -->
  <rect x="830" y="510" width="240" height="70" rx="8" fill="#1B2838" stroke="#00BCD4" stroke-width="2"/>
  <rect x="845" y="522" width="28" height="28" rx="5" fill="#00BCD4"/>
  <text x="859" y="541" text-anchor="middle" font-size="12" fill="#fff">☁</text>
  <text x="885" y="535" font-size="12" fill="#80DEEA" font-weight="bold">CloudFront</text>
  <text x="885" y="552" font-size="9" fill="#B0BEC5">OAC → S3 (graph/ prefix only)</text>
  <text x="845" y="572" font-size="8" fill="#80DEEA">https://d2psey9l8b57lu.cloudfront.net</text>

  <line x1="950" y1="475" x2="950" y2="508" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#a-cyan)"/>
  <text x="965" y="495" font-size="7" fill="#00BCD4">serves</text>

  <!-- User / Browser -->
  <rect x="870" y="620" width="160" height="55" rx="8" fill="#232F3E" stroke="#ccc" stroke-width="1"/>
  <text x="950" y="645" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Browser</text>
  <text x="950" y="662" text-anchor="middle" font-size="8" fill="#B0BEC5">D3.js force graph + filters</text>

  <line x1="950" y1="580" x2="950" y2="618" stroke="#ccc" stroke-width="1.5" marker-end="url(#a-gray)"/>

  <!-- ==================== GRAPH FEATURES BOX ==================== -->
  <rect x="830" y="700" width="420" height="150" rx="8" fill="#1B2838" stroke="#00BCD4" stroke-width="1"/>
  <text x="850" y="722" font-size="11" fill="#80DEEA" font-weight="bold">Graph Features (index.html)</text>
  <text x="850" y="742" font-size="9" fill="#E0E0E0">• Time filter: 15min, 1hr, 6hr, 24hr, 7d, 30d</text>
  <text x="850" y="757" font-size="9" fill="#E0E0E0">• Status filter: In Progress (amber), Completed (green), Failed (red), Linked (dark green)</text>
  <text x="850" y="772" font-size="9" fill="#E0E0E0">• Node types: Investigation, Resource, Cause</text>
  <text x="850" y="787" font-size="9" fill="#E0E0E0">• Double-click → opens investigation in DevOps Agent console</text>
  <text x="850" y="802" font-size="9" fill="#E0E0E0">• Click to highlight connected paths, search by name/ID</text>
  <text x="850" y="817" font-size="9" fill="#E0E0E0">• Auto-refresh: &lt;meta http-equiv="refresh" content="300"&gt;</text>
  <text x="850" y="832" font-size="9" fill="#64B5F6" font-style="italic">• 30-day TTL: older investigations excluded from HTML for performance</text>

  <!-- ==================== NEPTUNE NODE TYPES BOX ==================== -->
  <rect x="40" y="680" width="380" height="180" rx="8" fill="#1B2838" stroke="#9C27B0" stroke-width="1"/>
  <text x="60" y="702" font-size="11" fill="#CE93D8" font-weight="bold">Neptune Graph Schema</text>
  <text x="60" y="722" font-size="9" fill="#E0E0E0">Nodes:</text>
  <text x="75" y="737" font-size="8" fill="#FF9900">• Investigation (inv:{incident_id}) — status, space, region</text>
  <text x="75" y="752" font-size="8" fill="#2196F3">• Resource (res:{name}) — from RCA findings</text>
  <text x="75" y="767" font-size="8" fill="#E74C3C">• Cause (cause:{id}) — from cascade_graph</text>
  <text x="75" y="782" font-size="8" fill="#4CAF50">• ArnResource (arn:{arn}) — extracted ARNs</text>
  <text x="75" y="797" font-size="8" fill="#00BCD4">• K8sResource (k8s:{path}) — namespace/kind/name</text>
  <text x="75" y="812" font-size="8" fill="#555" font-style="italic">• InfraResource (cfg:{type}:{id}) — future: from AWS Config</text>
  <text x="60" y="830" font-size="9" fill="#E0E0E0">Edges: affects, root_cause, cascades_to, linked_to,</text>
  <text x="75" y="845" font-size="8" fill="#E0E0E0">investigated_by, affects_resource, affects_k8s, same_as</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="40" y="900" width="750" height="55" rx="8" fill="#1B2838" stroke="#455A64" stroke-width="1"/>
  <text x="60" y="922" font-size="10" font-weight="bold" fill="#888">Legend:</text>
  <line x1="60" y1="940" x2="90" y2="940" stroke="#4CAF50" stroke-width="2"/>
  <text x="95" y="944" font-size="9" fill="#A5D6A7">Write</text>
  <line x1="140" y1="940" x2="170" y2="940" stroke="#2196F3" stroke-width="2"/>
  <text x="175" y="944" font-size="9" fill="#90CAF9">Read</text>
  <line x1="210" y1="940" x2="240" y2="940" stroke="#9C27B0" stroke-width="2"/>
  <text x="245" y="944" font-size="9" fill="#CE93D8">DDB Streams</text>
  <line x1="330" y1="940" x2="360" y2="940" stroke="#00BCD4" stroke-width="2"/>
  <text x="365" y="944" font-size="9" fill="#80DEEA">CloudFront serve</text>
  <line x1="470" y1="940" x2="500" y2="940" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="505" y="944" font-size="9" fill="#666">Future (grayed out)</text>
</svg>
