<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 950" width="1300" height="950" font-family="Arial, sans-serif">
  <defs>
    <marker id="a-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF9900"/></marker>
    <marker id="a-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2196F3"/></marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/></marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#E74C3C"/></marker>
    <marker id="a-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9C27B0"/></marker>
    <marker id="a-white" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ccc"/></marker>
  </defs>

  <rect width="1300" height="950" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="650" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#FF9900">Global Endpoint → Forwarder → Agent → Dispatcher Flow</text>
  <text x="650" y="52" text-anchor="middle" font-size="11" fill="#888">Alert arrives → routed to healthy region → forwarded to least-loaded agent → lifecycle events tracked in DynamoDB</text>

  <!-- ==================== STEP 1: External Alert ==================== -->
  <rect x="50" y="80" width="180" height="55" rx="8" fill="#232F3E" stroke="#ccc" stroke-width="1"/>
  <text x="140" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">External Alert</text>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#B0BEC5">PagerDuty / CloudWatch / Orchestrator</text>

  <!-- Arrow to Global Endpoint -->
  <line x1="230" y1="107" x2="310" y2="107" stroke="#ccc" stroke-width="1.5" marker-end="url(#a-white)"/>
  <text x="270" y="98" text-anchor="middle" font-size="8" fill="#888">PutEvents</text>

  <!-- ==================== STEP 2: EventBridge Global Endpoint ==================== -->
  <rect x="315" y="75" width="280" height="65" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="2"/>
  <rect x="330" y="88" width="30" height="30" rx="5" fill="#FF9900"/>
  <text x="345" y="108" text-anchor="middle" font-size="14" fill="#fff">⚡</text>
  <text x="375" y="100" font-size="12" fill="#FFD54F" font-weight="bold">EventBridge Global Endpoint</text>
  <text x="375" y="116" font-size="9" fill="#B0BEC5">fis-chaos-global (Route53 health check failover)</text>
  <text x="375" y="130" font-size="8" fill="#64B5F6">Routes to healthy region's custom bus</text>

  <!-- Route53 Health Check -->
  <rect x="640" y="75" width="160" height="45" rx="6" fill="#1B2838" stroke="#E74C3C" stroke-width="1"/>
  <rect x="655" y="85" width="22" height="22" rx="3" fill="#E74C3C"/>
  <text x="666" y="101" text-anchor="middle" font-size="10" fill="#fff">♥</text>
  <text x="690" y="97" font-size="10" fill="#EF9A9A" font-weight="bold">Route53</text>
  <text x="690" y="112" font-size="8" fill="#B0BEC5">Health Check → CW Alarm</text>
  <line x1="595" y1="95" x2="638" y2="95" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-red)"/>

  <!-- ==================== STEP 3: Regional Buses (split) ==================== -->
  <!-- Primary bus -->
  <rect x="150" y="190" width="220" height="50" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="165" y="200" width="24" height="24" rx="4" fill="#FF9900"/>
  <text x="177" y="217" text-anchor="middle" font-size="10" fill="#fff">⚡</text>
  <text x="200" y="212" font-size="10" fill="#FFD54F" font-weight="bold">Custom Bus (eu-west-1)</text>
  <text x="200" y="228" font-size="8" fill="#B0BEC5">fis-chaos-global-inbound</text>

  <!-- Secondary bus -->
  <rect x="530" y="190" width="220" height="50" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="545" y="200" width="24" height="24" rx="4" fill="#FF9900"/>
  <text x="557" y="217" text-anchor="middle" font-size="10" fill="#fff">⚡</text>
  <text x="580" y="212" font-size="10" fill="#FFD54F" font-weight="bold">Custom Bus (eu-central-1)</text>
  <text x="580" y="228" font-size="8" fill="#B0BEC5">fis-chaos-global-inbound</text>

  <!-- Arrows from Global Endpoint to buses -->
  <line x1="380" y1="140" x2="260" y2="188" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <line x1="480" y1="140" x2="640" y2="188" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a-orange)"/>
  <text x="220" y="168" font-size="8" fill="#4CAF50">healthy</text>
  <text x="580" y="168" font-size="8" fill="#E74C3C">failover</text>

  <!-- ==================== STEP 4: SQS Inbound Queues ==================== -->
  <rect x="170" y="280" width="180" height="45" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1"/>
  <rect x="185" y="290" width="22" height="22" rx="3" fill="#FF9900"/>
  <text x="196" y="306" text-anchor="middle" font-size="10" fill="#fff">▤</text>
  <text x="220" y="300" font-size="9" fill="#FFD54F">SQS Inbound</text>
  <text x="220" y="314" font-size="8" fill="#B0BEC5">14-day retention, DLQ</text>

  <rect x="550" y="280" width="180" height="45" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1"/>
  <rect x="565" y="290" width="22" height="22" rx="3" fill="#FF9900"/>
  <text x="576" y="306" text-anchor="middle" font-size="10" fill="#fff">▤</text>
  <text x="600" y="300" font-size="9" fill="#FFD54F">SQS Inbound</text>
  <text x="600" y="314" font-size="8" fill="#B0BEC5">14-day retention, DLQ</text>

  <line x1="260" y1="240" x2="260" y2="278" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <line x1="640" y1="240" x2="640" y2="278" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <!-- ==================== STEP 5: Global Forwarder Lambda ==================== -->
  <rect x="120" y="370" width="280" height="120" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="2"/>
  <rect x="135" y="382" width="30" height="30" rx="5" fill="#FF9900"/>
  <text x="150" y="402" text-anchor="middle" font-size="14" fill="#fff">λ</text>
  <text x="175" y="395" font-size="12" fill="#FFD54F" font-weight="bold">global_forwarder</text>
  <text x="175" y="412" font-size="9" fill="#B0BEC5">(eu-west-1 instance)</text>
  <text x="135" y="435" font-size="9" fill="#E0E0E0">1. Read endpoints from Secrets Manager</text>
  <text x="135" y="450" font-size="9" fill="#E0E0E0">2. Scan DynamoDB for active load per space</text>
  <text x="135" y="465" font-size="9" fill="#E0E0E0">3. Pick least-loaded (or force_target)</text>
  <text x="135" y="480" font-size="9" fill="#E0E0E0">4. HMAC sign + POST to agent webhook</text>

  <rect x="500" y="370" width="280" height="120" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="2"/>
  <rect x="515" y="382" width="30" height="30" rx="5" fill="#FF9900"/>
  <text x="530" y="402" text-anchor="middle" font-size="14" fill="#fff">λ</text>
  <text x="555" y="395" font-size="12" fill="#FFD54F" font-weight="bold">global_forwarder</text>
  <text x="555" y="412" font-size="9" fill="#B0BEC5">(eu-central-1 instance)</text>
  <text x="515" y="435" font-size="9" fill="#E0E0E0">Same logic — reads same secret</text>
  <text x="515" y="450" font-size="9" fill="#E0E0E0">(replicated via Secrets Manager)</text>
  <text x="515" y="465" font-size="9" fill="#E0E0E0">On failure: forwards to other</text>
  <text x="515" y="480" font-size="9" fill="#E0E0E0">region's SQS (1 retry then DLQ)</text>

  <line x1="260" y1="325" x2="260" y2="368" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <line x1="640" y1="325" x2="640" y2="368" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <!-- Cross-region failover arrow -->
  <line x1="400" y1="430" x2="498" y2="430" stroke="#E74C3C" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a-red)"/>
  <text x="449" y="422" text-anchor="middle" font-size="7" fill="#EF9A9A">failover SQS</text>

  <!-- Secrets Manager -->
  <rect x="870" y="370" width="180" height="55" rx="6" fill="#1B2838" stroke="#E74C3C" stroke-width="1.5"/>
  <rect x="885" y="382" width="24" height="24" rx="4" fill="#E74C3C"/>
  <text x="897" y="399" text-anchor="middle" font-size="10" fill="#fff">🔑</text>
  <text x="920" y="395" font-size="10" fill="#EF9A9A" font-weight="bold">Secrets Manager</text>
  <text x="920" y="412" font-size="8" fill="#B0BEC5">fis-chaos/webhook-proxy</text>
  <text x="885" y="420" font-size="7" fill="#B0BEC5">{endpoints: [{space_id, region, webhook_url, secret}]}</text>

  <line x1="780" y1="400" x2="868" y2="400" stroke="#E74C3C" stroke-width="1" marker-end="url(#a-red)"/>
  <line x1="400" y1="400" x2="420" y2="400" stroke="#E74C3C" stroke-width="1"/>
  <line x1="420" y1="400" x2="420" y2="350" stroke="#E74C3C" stroke-width="1"/>
  <line x1="420" y1="350" x2="870" y2="350" stroke="#E74C3C" stroke-width="1"/>
  <line x1="870" y1="350" x2="870" y2="368" stroke="#E74C3C" stroke-width="1" marker-end="url(#a-red)"/>
  <text x="650" y="343" text-anchor="middle" font-size="8" fill="#EF9A9A">read endpoints (cached 60s)</text>

  <!-- DynamoDB (capacity check) -->
  <rect x="870" y="450" width="180" height="50" rx="6" fill="#1B2838" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="885" y="460" width="24" height="24" rx="4" fill="#2196F3"/>
  <text x="897" y="477" text-anchor="middle" font-size="10" fill="#fff">⬡</text>
  <text x="920" y="473" font-size="10" fill="#90CAF9" font-weight="bold">DynamoDB</text>
  <text x="920" y="488" font-size="8" fill="#B0BEC5">scan: count active per space_id</text>

  <line x1="780" y1="460" x2="868" y2="470" stroke="#2196F3" stroke-width="1" marker-end="url(#a-blue)"/>

  <!-- ==================== STEP 6: DevOps Agent ==================== -->
  <rect x="200" y="540" width="500" height="60" rx="8" fill="#1B2838" stroke="#4CAF50" stroke-width="2"/>
  <rect x="215" y="552" width="30" height="30" rx="5" fill="#4CAF50"/>
  <text x="230" y="572" text-anchor="middle" font-size="12" fill="#fff">🤖</text>
  <text x="260" y="567" font-size="12" fill="#A5D6A7" font-weight="bold">AWS DevOps Agent Space</text>
  <text x="260" y="584" font-size="9" fill="#B0BEC5">(whichever space was selected by forwarder)</text>
  <text x="500" y="567" font-size="9" fill="#E0E0E0">Receives webhook → Creates investigation → Investigates → Publishes lifecycle events</text>

  <line x1="260" y1="490" x2="350" y2="538" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#a-green)"/>
  <text x="280" y="518" font-size="8" fill="#4CAF50">HMAC webhook POST</text>

  <!-- ==================== STEP 7: Agent publishes to EventBridge ==================== -->
  <rect x="200" y="650" width="500" height="50" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="215" y="660" width="24" height="24" rx="4" fill="#FF9900"/>
  <text x="227" y="677" text-anchor="middle" font-size="10" fill="#fff">⚡</text>
  <text x="250" y="673" font-size="10" fill="#FFD54F" font-weight="bold">EventBridge (default bus)</text>
  <text x="250" y="688" font-size="8" fill="#B0BEC5">source: aws.aidevops</text>
  <text x="450" y="673" font-size="9" fill="#E0E0E0">Created → In Progress → Completed/Failed/Linked</text>

  <line x1="450" y1="600" x2="450" y2="648" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>
  <text x="465" y="628" font-size="8" fill="#FF9900">publishes events</text>

  <!-- ==================== STEP 8: SQS Agent Events → Dispatcher ==================== -->
  <rect x="200" y="740" width="180" height="45" rx="6" fill="#1B2838" stroke="#FF9900" stroke-width="1"/>
  <rect x="215" y="750" width="22" height="22" rx="3" fill="#FF9900"/>
  <text x="226" y="766" text-anchor="middle" font-size="10" fill="#fff">▤</text>
  <text x="250" y="760" font-size="9" fill="#FFD54F">SQS Agent Events</text>
  <text x="250" y="774" font-size="8" fill="#B0BEC5">fis-chaos-agent-events</text>

  <line x1="350" y1="700" x2="290" y2="738" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <!-- Dispatcher Lambda -->
  <rect x="450" y="730" width="280" height="100" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="2"/>
  <rect x="465" y="742" width="30" height="30" rx="5" fill="#FF9900"/>
  <text x="480" y="762" text-anchor="middle" font-size="14" fill="#fff">λ</text>
  <text x="505" y="755" font-size="12" fill="#FFD54F" font-weight="bold">dispatcher</text>
  <text x="505" y="772" font-size="9" fill="#B0BEC5">Triggered by SQS (batch=10, 5s window)</text>
  <text x="465" y="795" font-size="9" fill="#E0E0E0">1. On "Created": call agent API → resolve incident_id</text>
  <text x="465" y="810" font-size="9" fill="#E0E0E0">2. On subsequent: lookup incident_id from task_id GSI</text>
  <text x="465" y="825" font-size="9" fill="#E0E0E0">3. Write status update to DynamoDB (update_item)</text>

  <line x1="380" y1="762" x2="448" y2="762" stroke="#FF9900" stroke-width="1.5" marker-end="url(#a-orange)"/>

  <!-- DynamoDB (write from dispatcher) -->
  <rect x="830" y="750" width="180" height="60" rx="8" fill="#1B2838" stroke="#2196F3" stroke-width="2"/>
  <rect x="845" y="762" width="28" height="28" rx="5" fill="#2196F3"/>
  <text x="859" y="781" text-anchor="middle" font-size="12" fill="#fff">⬡</text>
  <text x="885" y="778" font-size="11" fill="#90CAF9" font-weight="bold">DynamoDB</text>
  <text x="885" y="795" font-size="8" fill="#B0BEC5">fis-chaos-investigations</text>
  <text x="845" y="805" font-size="7" fill="#64B5F6">incident_id → task_id, space_id, status, region</text>

  <line x1="730" y1="780" x2="828" y2="780" stroke="#4CAF50" stroke-width="2" marker-end="url(#a-green)"/>
  <text x="779" y="772" text-anchor="middle" font-size="8" fill="#4CAF50">update_item</text>

  <!-- Connection: Forwarder also writes to DynamoDB -->
  <line x1="870" y1="500" x2="920" y2="748" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a-green)"/>
  <text x="930" y="630" font-size="7" fill="#4CAF50" transform="rotate(75,930,630)">forwarder writes routed_to</text>

  <!-- ==================== STEP NUMBERS ==================== -->
  <circle cx="270" cy="107" r="10" fill="#FF9900"/>
  <text x="270" y="111" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">1</text>

  <circle cx="455" cy="170" r="10" fill="#FF9900"/>
  <text x="455" y="174" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">2</text>

  <circle cx="260" cy="255" r="10" fill="#FF9900"/>
  <text x="260" y="259" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">3</text>

  <circle cx="260" cy="350" r="10" fill="#FF9900"/>
  <text x="260" y="354" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">4</text>

  <circle cx="310" cy="518" r="10" fill="#4CAF50"/>
  <text x="310" y="522" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">5</text>

  <circle cx="465" cy="628" r="10" fill="#FF9900"/>
  <text x="465" y="632" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">6</text>

  <circle cx="415" cy="762" r="10" fill="#FF9900"/>
  <text x="415" y="766" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">7</text>

  <circle cx="779" cy="780" r="10" fill="#4CAF50"/>
  <text x="779" y="784" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">8</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="50" y="870" width="1200" height="65" rx="8" fill="#1B2838" stroke="#455A64" stroke-width="1"/>
  <text x="70" y="892" font-size="11" font-weight="bold" fill="#888">Flow:</text>
  <text x="70" y="910" font-size="9" fill="#E0E0E0">① Alert → ② Global Endpoint routes to healthy region → ③ Custom bus → SQS buffer → ④ Forwarder reads config + capacity</text>
  <text x="70" y="925" font-size="9" fill="#E0E0E0">→ ⑤ HMAC signs + POSTs to agent webhook → ⑥ Agent publishes lifecycle events → ⑦ SQS → Dispatcher → ⑧ Writes status to DynamoDB</text>
</svg>
