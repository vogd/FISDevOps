<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 440" width="1400" height="440" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6c8ebf"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF9900"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#82b366"/></marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#b85450"/></marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9673a6"/></marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00BCD4"/></marker>
  </defs>

  <rect width="1400" height="440" fill="#1a1a2e"/>

  <!-- Region labels -->
  <text x="330" y="18" text-anchor="middle" font-size="11" fill="#6c8ebf" font-weight="bold" font-style="italic">Region A (eu-west-1) — Infrastructure</text>
  <text x="1020" y="18" text-anchor="middle" font-size="11" fill="#FF9900" font-weight="bold" font-style="italic">Region A/B — Agent + Scoring + Graph</text>

  <!-- ==================== ROW 1: Fault Injection ==================== -->
  <rect x="20" y="45" width="130" height="55" rx="8" fill="#1B2838" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="85" y="70" text-anchor="middle" font-size="11" fill="#90CAF9" font-weight="bold">Orchestrator</text>
  <text x="85" y="87" text-anchor="middle" font-size="9" fill="#B0BEC5">(Python CLI)</text>

  <rect x="190" y="45" width="130" height="55" rx="8" fill="#1B2838" stroke="#9673a6" stroke-width="1.5"/>
  <text x="255" y="70" text-anchor="middle" font-size="11" fill="#CE93D8" font-weight="bold">AWS FIS</text>
  <text x="255" y="87" text-anchor="middle" font-size="9" fill="#B0BEC5">10 templates</text>

  <rect x="360" y="45" width="130" height="55" rx="8" fill="#1B2838" stroke="#b85450" stroke-width="1.5"/>
  <text x="425" y="70" text-anchor="middle" font-size="11" fill="#EF9A9A" font-weight="bold">Chaos Mesh</text>
  <text x="425" y="87" text-anchor="middle" font-size="9" fill="#B0BEC5">EKS CRDs</text>

  <rect x="530" y="45" width="130" height="55" rx="8" fill="#1B2838" stroke="#82b366" stroke-width="1.5"/>
  <text x="595" y="70" text-anchor="middle" font-size="11" fill="#A5D6A7" font-weight="bold">App Pods</text>
  <text x="595" y="87" text-anchor="middle" font-size="9" fill="#B0BEC5">ns: app (6 svc)</text>

  <!-- Row 1 arrows -->
  <line x1="150" y1="72" x2="188" y2="72" stroke="#6c8ebf" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="169" y="64" text-anchor="middle" font-size="8" fill="#6c8ebf">①</text>
  <line x1="320" y1="72" x2="358" y2="72" stroke="#b85450" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="339" y="64" text-anchor="middle" font-size="8" fill="#b85450">CRD</text>
  <line x1="490" y1="72" x2="528" y2="72" stroke="#b85450" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <text x="509" y="64" text-anchor="middle" font-size="8" fill="#b85450">fault</text>

  <!-- ==================== ROW 2: Routing + Agent ==================== -->
  <rect x="190" y="150" width="200" height="55" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <text x="290" y="173" text-anchor="middle" font-size="11" fill="#FFD54F" font-weight="bold">Global Endpoint</text>
  <text x="290" y="191" text-anchor="middle" font-size="9" fill="#B0BEC5">EventBridge + Route53</text>

  <rect x="440" y="150" width="180" height="55" rx="8" fill="#1B2838" stroke="#FF9900" stroke-width="1.5"/>
  <text x="530" y="173" text-anchor="middle" font-size="11" fill="#FFD54F" font-weight="bold">Global Forwarder</text>
  <text x="530" y="191" text-anchor="middle" font-size="9" fill="#B0BEC5">λ HMAC + capacity</text>

  <rect x="670" y="135" width="180" height="50" rx="8" fill="#1B2838" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="760" y="157" text-anchor="middle" font-size="11" fill="#A5D6A7" font-weight="bold">Agent (primary)</text>
  <text x="760" y="173" text-anchor="middle" font-size="9" fill="#B0BEC5">eu-west-1</text>

  <rect x="670" y="195" width="180" height="50" rx="8" fill="#1B2838" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="760" y="217" text-anchor="middle" font-size="11" fill="#A5D6A7">Agent (secondary)</text>
  <text x="760" y="233" text-anchor="middle" font-size="9" fill="#B0BEC5">eu-central-1</text>

  <!-- Row 2 arrows -->
  <line x1="85" y1="100" x2="85" y2="170" stroke="#FF9900" stroke-width="1"/>
  <line x1="85" y1="170" x2="188" y2="177" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="135" y="163" text-anchor="middle" font-size="8" fill="#FF9900">② PutEvents</text>
  <line x1="390" y1="177" x2="438" y2="177" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="620" y1="168" x2="668" y2="160" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="620" y1="185" x2="668" y2="220" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <text x="645" y="152" font-size="8" fill="#4CAF50">webhook</text>

  <!-- ==================== ROW 3: RCA + Scoring ==================== -->
  <rect x="890" y="140" width="130" height="50" rx="8" fill="#1B2838" stroke="#d6b656" stroke-width="1.5"/>
  <text x="955" y="162" text-anchor="middle" font-size="11" fill="#FFD54F" font-weight="bold">RCA</text>
  <text x="955" y="178" text-anchor="middle" font-size="9" fill="#B0BEC5">summary_md</text>

  <rect x="1060" y="140" width="140" height="50" rx="8" fill="#1B2838" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1130" y="162" text-anchor="middle" font-size="11" fill="#CE93D8" font-weight="bold">Bedrock</text>
  <text x="1130" y="178" text-anchor="middle" font-size="9" fill="#B0BEC5">Claude (scorer)</text>

  <rect x="1240" y="140" width="130" height="50" rx="8" fill="#1B2838" stroke="#3F8624" stroke-width="1.5"/>
  <text x="1305" y="162" text-anchor="middle" font-size="11" fill="#81C784" font-weight="bold">S3</text>
  <text x="1305" y="178" text-anchor="middle" font-size="9" fill="#B0BEC5">results + graph/</text>

  <!-- Row 3 arrows -->
  <line x1="850" y1="160" x2="888" y2="165" stroke="#d6b656" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="869" y="153" text-anchor="middle" font-size="8" fill="#d6b656">③</text>
  <line x1="1020" y1="165" x2="1058" y2="165" stroke="#9673a6" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="1039" y="157" text-anchor="middle" font-size="8" fill="#9673a6">④</text>
  <line x1="1200" y1="165" x2="1238" y2="165" stroke="#82b366" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="1219" y="157" text-anchor="middle" font-size="8" fill="#82b366">⑤</text>

  <!-- ==================== ROW 4: DynamoDB + Neptune + CloudFront ==================== -->
  <rect x="670" y="300" width="180" height="55" rx="8" fill="#1B2838" stroke="#2196F3" stroke-width="1.5"/>
  <text x="760" y="323" text-anchor="middle" font-size="11" fill="#90CAF9" font-weight="bold">DynamoDB</text>
  <text x="760" y="341" text-anchor="middle" font-size="9" fill="#B0BEC5">Global Table (status)</text>

  <rect x="890" y="300" width="140" height="55" rx="8" fill="#1B2838" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="960" y="323" text-anchor="middle" font-size="11" fill="#CE93D8" font-weight="bold">Neptune</text>
  <text x="960" y="341" text-anchor="middle" font-size="9" fill="#B0BEC5">Graph DB</text>

  <rect x="1070" y="300" width="180" height="55" rx="8" fill="#1B2838" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="1160" y="323" text-anchor="middle" font-size="11" fill="#80DEEA" font-weight="bold">CloudFront</text>
  <text x="1160" y="341" text-anchor="middle" font-size="9" fill="#B0BEC5">Incident Graph (D3.js)</text>

  <!-- Row 4 arrows -->
  <line x1="760" y1="245" x2="760" y2="298" stroke="#2196F3" stroke-width="1" marker-end="url(#arr-blue)"/>
  <text x="775" y="275" font-size="8" fill="#90CAF9">events</text>
  <line x1="850" y1="327" x2="888" y2="327" stroke="#9C27B0" stroke-width="1" marker-end="url(#arr-purple)"/>
  <text x="869" y="319" font-size="8" fill="#CE93D8">streams</text>
  <line x1="1305" y1="190" x2="1305" y2="290" stroke="#00BCD4" stroke-width="1"/>
  <line x1="1305" y1="290" x2="1252" y2="305" stroke="#00BCD4" stroke-width="1" marker-end="url(#arr-cyan)"/>
  <text x="1285" y="250" font-size="8" fill="#00BCD4">graph/</text>

  <!-- RBAC note -->
  <text x="425" y="125" text-anchor="middle" font-size="9" fill="#b85450" font-weight="bold">🔒 RBAC: Agent cannot see chaos-mesh namespace</text>

  <!-- Legend bar -->
  <rect x="20" y="390" width="1350" height="35" rx="6" fill="#1B2838" stroke="#455A64" stroke-width="0.5"/>
  <text x="40" y="412" font-size="9" fill="#B0BEC5">① Start FIS → ② PutEvents to Global Endpoint → Forwarder HMAC signs + routes → ③ Agent produces RCA → ④ Scorer evaluates → ⑤ S3 → DynamoDB tracks → Neptune + CloudFront visualize</text>
</svg>
