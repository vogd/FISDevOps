<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" width="700" height="230" font-family="Arial, sans-serif">

  <!-- Header -->
  <text x="350" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">Secondary Agent (eu-central-1): Investigation Duration</text>

  <!-- Table header -->
  <rect x="20" y="38" width="160" height="30" rx="4" fill="#37474F"/>
  <rect x="180" y="38" width="200" height="30" rx="4" fill="#C62828"/>
  <rect x="380" y="38" width="200" height="30" rx="4" fill="#2E7D32"/>
  <rect x="580" y="38" width="100" height="30" rx="4" fill="#1565C0"/>

  <text x="100" y="58" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Metric</text>
  <text x="280" y="58" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Without S3 (before)</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">With S3 (today)</text>
  <text x="630" y="58" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Delta</text>

  <!-- Row 1: Average -->
  <rect x="20" y="68" width="160" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="180" y="68" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="380" y="68" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="580" y="68" width="100" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <text x="30" y="86" font-size="12" fill="#90CAF9" font-weight="bold">Average</text>
  <text x="280" y="86" text-anchor="middle" font-size="12" fill="#E0E0E0">4.3 min (261s)</text>
  <text x="480" y="86" text-anchor="middle" font-size="12" fill="#E0E0E0">5.3 min (320s)</text>
  <text x="630" y="86" text-anchor="middle" font-size="12" fill="#BBDEFB" font-weight="bold">+1.0 min</text>

  <!-- Row 2: Min -->
  <rect x="20" y="96" width="160" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="180" y="96" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="380" y="96" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="580" y="96" width="100" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <text x="30" y="114" font-size="12" fill="#B0BEC5">Min</text>
  <text x="280" y="114" text-anchor="middle" font-size="12" fill="#B0BEC5">0.7 min</text>
  <text x="480" y="114" text-anchor="middle" font-size="12" fill="#B0BEC5">2.8 min</text>
  <text x="630" y="114" text-anchor="middle" font-size="12" fill="#BBDEFB">+2.1 min</text>

  <!-- Row 3: Max -->
  <rect x="20" y="124" width="160" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="180" y="124" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="380" y="124" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="580" y="124" width="100" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <text x="30" y="142" font-size="12" fill="#B0BEC5">Max</text>
  <text x="280" y="142" text-anchor="middle" font-size="12" fill="#B0BEC5">8.8 min</text>
  <text x="480" y="142" text-anchor="middle" font-size="12" fill="#B0BEC5">10.9 min</text>
  <text x="630" y="142" text-anchor="middle" font-size="12" fill="#BBDEFB">+2.1 min</text>

  <!-- Row 4: Median -->
  <rect x="20" y="152" width="160" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="180" y="152" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="380" y="152" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="580" y="152" width="100" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <text x="30" y="170" font-size="12" fill="#B0BEC5">Median</text>
  <text x="280" y="170" text-anchor="middle" font-size="12" fill="#B0BEC5">4.8 min</text>
  <text x="480" y="170" text-anchor="middle" font-size="12" fill="#B0BEC5">5.1 min</text>
  <text x="630" y="170" text-anchor="middle" font-size="12" fill="#BBDEFB">+0.3 min</text>

  <!-- Row 5: Samples -->
  <rect x="20" y="180" width="160" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="180" y="180" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="380" y="180" width="200" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <rect x="580" y="180" width="100" height="28" fill="none" stroke="#455A64" stroke-width="0.5"/>
  <text x="30" y="198" font-size="12" fill="#B0BEC5">Samples</text>
  <text x="280" y="198" text-anchor="middle" font-size="12" fill="#B0BEC5">15</text>
  <text x="480" y="198" text-anchor="middle" font-size="12" fill="#B0BEC5">12</text>
  <text x="630" y="198" text-anchor="middle" font-size="12" fill="#B0BEC5"></text>

</svg>